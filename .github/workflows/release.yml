name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip publish, release creation, homebrew)'
        required: true
        type: boolean
        default: true
      version:
        description: 'Version to simulate (e.g., 0.1.3)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}

jobs:
  verify-tag-signature:
    name: Verify Tag Signature
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify tag is signed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Verifying signature for tag: $TAG"
          
          # Get tag ref to find the tag object SHA
          TAG_SHA=$(gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" --jq '.object.sha')
          TAG_TYPE=$(gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" --jq '.object.type')
          
          if [ "$TAG_TYPE" != "tag" ]; then
            echo "ERROR: $TAG is a lightweight tag (type: $TAG_TYPE), not an annotated/signed tag"
            exit 1
          fi
          
          # Verify the tag signature via GitHub API
          VERIFIED=$(gh api "repos/${{ github.repository }}/git/tags/$TAG_SHA" --jq '.verification.verified')
          REASON=$(gh api "repos/${{ github.repository }}/git/tags/$TAG_SHA" --jq '.verification.reason')
          
          echo "Tag verification: verified=$VERIFIED, reason=$REASON"
          
          if [ "$VERIFIED" != "true" ]; then
            echo "ERROR: Tag $TAG signature is not valid (reason: $REASON)"
            exit 1
          fi
          
          echo "Tag $TAG is signed and verified by GitHub"

  create-release:
    name: Create Release
    needs: [verify-tag-signature]
    if: always() && (needs.verify-tag-signature.result == 'success' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ env.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag or input
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Validate version matches Cargo.toml
        if: ${{ github.event_name != 'workflow_dispatch' }}
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version $VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Create GitHub release
        if: ${{ env.DRY_RUN != 'true' }}
        id: create_release
        uses: taiki-e/create-gh-release-action@c5baa0b5dc700cf06439d87935e130220a6882d9 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false

      - name: Dry run - skip release creation
        if: ${{ env.DRY_RUN == 'true' }}
        run: echo "DRY RUN - Would create release for v$VERSION"

  build-and-attest:
    name: Build ${{ matrix.target }}
    needs: create-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
            cross: true
          - target: aarch64-apple-darwin
            os: macos-15
            cross: false
    uses: ./.github/workflows/build-and-attest.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}
      cross: ${{ matrix.cross }}
      version: ${{ needs.create-release.outputs.version }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
    secrets: inherit

  update-homebrew:
    name: Update Homebrew Formula
    needs: build-and-attest
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout homebrew-tap repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: clouatre-labs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download SHA256 checksums
        run: |
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          RELEASE_URL="https://api.github.com/repos/clouatre-labs/aptu/releases/tags/${RELEASE_TAG}"
          
          # Get release assets
          ALL_ASSETS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$RELEASE_URL" | jq '.assets[]')
          
          # Download CLI tarballs (aptu-cli-*) and compute SHA256
          echo "$ALL_ASSETS" | jq -r 'select(.name | startswith("aptu-cli-") and endswith(".tar.gz")) | .browser_download_url' | while read -r url; do
            filename=$(basename "$url")
            curl -sL "$url" -o "/tmp/$filename"
            sha256=$(sha256sum "/tmp/$filename" | cut -d' ' -f1)
            echo "$filename:$sha256" >> /tmp/checksums-cli.txt
          done
          
          # Download MCP tarballs (aptu-mcp-*) and compute SHA256
          echo "$ALL_ASSETS" | jq -r 'select(.name | startswith("aptu-mcp-") and endswith(".tar.gz")) | .browser_download_url' | while read -r url; do
            filename=$(basename "$url")
            curl -sL "$url" -o "/tmp/$filename"
            sha256=$(sha256sum "/tmp/$filename" | cut -d' ' -f1)
            echo "$filename:$sha256" >> /tmp/checksums-mcp.txt
          done

      - name: Update formula with SHA256 values
        run: |
          cd homebrew-tap
          
          # Read CLI checksums
          declare -A shas
          while IFS=':' read -r filename sha; do
            shas["$filename"]="$sha"
          done < /tmp/checksums-cli.txt
          
          # Update formula with if/elsif syntax
          FORMULA="Formula/aptu.rb"
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NUMBER="${RELEASE_TAG#v}"
          
          # Generate formula content with if/elsif for architecture detection
          cat > "$FORMULA" << 'FORMULA_EOF'
          class Aptu < Formula
            desc "Gamified OSS issue triage with AI assistance"
            homepage "https://github.com/clouatre-labs/aptu"
            license "Apache-2.0"
            
            if OS.mac? && Hardware::CPU.arm?
              url "https://github.com/clouatre-labs/aptu/releases/download/TAG_PLACEHOLDER/aptu-cli-VERSION_NUMBER_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
              sha256 "SHA256_MACOS_ARM_PLACEHOLDER"
            elsif OS.linux? && Hardware::CPU.arm?
              url "https://github.com/clouatre-labs/aptu/releases/download/TAG_PLACEHOLDER/aptu-cli-VERSION_NUMBER_PLACEHOLDER-aarch64-unknown-linux-musl.tar.gz"
              sha256 "SHA256_LINUX_ARM_PLACEHOLDER"
            elsif OS.linux? && Hardware::CPU.intel?
              url "https://github.com/clouatre-labs/aptu/releases/download/TAG_PLACEHOLDER/aptu-cli-VERSION_NUMBER_PLACEHOLDER-x86_64-unknown-linux-musl.tar.gz"
              sha256 "SHA256_LINUX_INTEL_PLACEHOLDER"
            end
            
            def install
              bin.install "aptu"
            end
            
            test do
              assert_match version.to_s, shell_output("#{bin}/aptu --version")
            end
          end
          FORMULA_EOF
          
          # Replace placeholders with actual values
          sed -i "s/VERSION_NUMBER_PLACEHOLDER/${VERSION_NUMBER}/g" "$FORMULA"
          sed -i "s/TAG_PLACEHOLDER/${RELEASE_TAG}/g" "$FORMULA"
          sed -i "s/SHA256_MACOS_ARM_PLACEHOLDER/${shas["aptu-cli-${VERSION_NUMBER}-aarch64-apple-darwin.tar.gz"]}/g" "$FORMULA"
          sed -i "s/SHA256_LINUX_ARM_PLACEHOLDER/${shas["aptu-cli-${VERSION_NUMBER}-aarch64-unknown-linux-musl.tar.gz"]}/g" "$FORMULA"
          sed -i "s/SHA256_LINUX_INTEL_PLACEHOLDER/${shas["aptu-cli-${VERSION_NUMBER}-x86_64-unknown-linux-musl.tar.gz"]}/g" "$FORMULA"

          # Generate aptu-mcp formula
          MCP_FORMULA="Formula/aptu-mcp.rb"
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NUMBER="${RELEASE_TAG#v}"

          declare -A mcp_shas
          if [ -f /tmp/checksums-mcp.txt ]; then
            while IFS=':' read -r filename sha; do
              mcp_shas["$filename"]="$sha"
            done < /tmp/checksums-mcp.txt
          fi

          cat > "$MCP_FORMULA" << 'MCPFORMULA_EOF'
          class AptuMcp < Formula
            desc "MCP server exposing aptu-core functionality for AI-powered GitHub triage and review"
            homepage "https://github.com/clouatre-labs/aptu"
            license "Apache-2.0"
            
            if OS.mac? && Hardware::CPU.arm?
              url "https://github.com/clouatre-labs/aptu/releases/download/MCP_TAG_PLACEHOLDER/aptu-mcp-MCP_VERSION_NUMBER_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
              sha256 "MCP_SHA256_MACOS_ARM_PLACEHOLDER"
            elsif OS.linux? && Hardware::CPU.arm?
              url "https://github.com/clouatre-labs/aptu/releases/download/MCP_TAG_PLACEHOLDER/aptu-mcp-MCP_VERSION_NUMBER_PLACEHOLDER-aarch64-unknown-linux-musl.tar.gz"
              sha256 "MCP_SHA256_LINUX_ARM_PLACEHOLDER"
            elsif OS.linux? && Hardware::CPU.intel?
              url "https://github.com/clouatre-labs/aptu/releases/download/MCP_TAG_PLACEHOLDER/aptu-mcp-MCP_VERSION_NUMBER_PLACEHOLDER-x86_64-unknown-linux-musl.tar.gz"
              sha256 "MCP_SHA256_LINUX_INTEL_PLACEHOLDER"
            end
            
            def install
              bin.install "aptu-mcp"
            end
            
            test do
              assert_match version.to_s, shell_output("#{bin}/aptu-mcp --version")
            end
          end
          MCPFORMULA_EOF

          sed -i "s/MCP_VERSION_NUMBER_PLACEHOLDER/${VERSION_NUMBER}/g" "$MCP_FORMULA"
          sed -i "s/MCP_TAG_PLACEHOLDER/${RELEASE_TAG}/g" "$MCP_FORMULA"
          sed -i "s/MCP_SHA256_MACOS_ARM_PLACEHOLDER/${mcp_shas["aptu-mcp-${VERSION_NUMBER}-aarch64-apple-darwin.tar.gz"]}/g" "$MCP_FORMULA"
          sed -i "s/MCP_SHA256_LINUX_ARM_PLACEHOLDER/${mcp_shas["aptu-mcp-${VERSION_NUMBER}-aarch64-unknown-linux-musl.tar.gz"]}/g" "$MCP_FORMULA"
          sed -i "s/MCP_SHA256_LINUX_INTEL_PLACEHOLDER/${mcp_shas["aptu-mcp-${VERSION_NUMBER}-x86_64-unknown-linux-musl.tar.gz"]}/g" "$MCP_FORMULA"

      - name: Create feature branch and commit formula update
        run: |
          cd homebrew-tap
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          BRANCH_NAME="update-aptu-${RELEASE_TAG}"
          
          git config user.email "hugues@linux.com"
          git config user.name "Hugues Clouatre"
          git checkout -b "$BRANCH_NAME"
          git add Formula/aptu.rb Formula/aptu-mcp.rb
          git commit --signoff -m "Update aptu and aptu-mcp formulas for ${RELEASE_TAG}"
          git push origin "$BRANCH_NAME"

      - name: Create pull request with auto-merge
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cd homebrew-tap
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          BRANCH_NAME="update-aptu-${RELEASE_TAG}"
          
          gh pr create \
            --title "Update aptu and aptu-mcp formulas for ${RELEASE_TAG}" \
            --body "Automated formula update with SHA256 checksums for release ${RELEASE_TAG}" \
            --head "$BRANCH_NAME" \
            --base main
          
          # Auto-merge after Audit check passes (ruleset requires status checks)
          gh pr merge "$BRANCH_NAME" --auto --squash --delete-branch

  publish-snap:
    name: Publish to Snap Store (${{ matrix.arch }})
    needs: create-release
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-24.04
          - arch: arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build snap
        id: build
        uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1
        with:
          snapcraft-args: pack

      - name: Publish snap to stable channel
        uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40 # v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable


  publish:
    name: Publish to crates.io
    needs: create-release
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1

      - name: Publish aptu-core
        run: cargo publish -p aptu-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for index propagation
        run: sleep 30

      - name: Publish aptu-cli
        run: cargo publish -p aptu-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for index propagation
        run: sleep 30

      - name: Publish aptu-mcp
        run: cargo publish -p aptu-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
