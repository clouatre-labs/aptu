# SPDX-License-Identifier: Apache-2.0

name: Deploy MCP Server

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-mcp
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy aptu-mcp to Fly.io
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    environment: fly-production
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy to Fly.io
        run: flyctl deploy --config crates/aptu-mcp/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
