# SPDX-License-Identifier: Apache-2.0

name: Deploy MCP Server

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-mcp
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy aptu-mcp to Fly.io
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    environment: fly-production
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master

      - name: Deploy to Fly.io
        run: flyctl deploy --config crates/aptu-mcp/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
