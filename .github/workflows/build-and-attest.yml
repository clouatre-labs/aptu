# SLSA v1.0 Build Level 3: this workflow is a reusable workflow (workflow_call).
# The reusable workflow boundary isolates the build and attestation steps from the
# caller, satisfying the Level 3 isolation requirement per GitHub's documentation:
# https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations/using-artifact-attestations-and-reusable-workflows-to-achieve-slsa-v1-build-level-3
name: Build and Attest

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: Rust target triple (e.g., x86_64-unknown-linux-musl)
      os:
        required: true
        type: string
        description: Runner OS (e.g., ubuntu-24.04, macos-15)
      cross:
        required: true
        type: boolean
        description: Whether to use cross-compilation tools
      version:
        required: true
        type: string
        description: Release version for archive naming (e.g., 0.1.3)
      dry_run:
        required: false
        type: boolean
        default: false
        description: Dry run mode (skip upload and attestation)

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-attest:
    name: Build ${{ inputs.target }}
    runs-on: ${{ inputs.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ inputs.target }}
      - name: Install cross-compilation tools
        if: ${{ inputs.cross }}
        uses: taiki-e/setup-cross-toolchain-action@d62f33b587e73b0004731caebc7d2d46b18a7567 # v1
        with:
          target: ${{ inputs.target }}
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: aptu
          key: ${{ inputs.target }}
      - name: Install cargo-deb
        if: ${{ startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux') }}
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2
        with:
          tool: cargo-deb
      - name: Build and upload aptu
        if: ${{ !inputs.dry_run }}
        id: upload-cli
        uses: taiki-e/upload-rust-binary-action@10c1cf6a3da113ad4e60018e386570529aa5f1d3 # v1
        with:
          bin: aptu
          target: ${{ inputs.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
          checksum: sha256
          archive: aptu-cli-${{ inputs.version }}-$target
      - name: Build and upload aptu-mcp
        if: ${{ !inputs.dry_run }}
        id: upload-mcp
        uses: taiki-e/upload-rust-binary-action@10c1cf6a3da113ad4e60018e386570529aa5f1d3 # v1
        with:
          bin: aptu-mcp
          target: ${{ inputs.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
          checksum: sha256
          archive: aptu-mcp-${{ inputs.version }}-$target
      - name: Build binary (dry-run)
        if: ${{ inputs.dry_run }}
        run: cargo build --release --target ${{ inputs.target }} -p aptu-cli -p aptu-mcp  # zizmor: ignore[template-injection]
      - name: Sign tarball with cosign
        if: ${{ !inputs.dry_run }}
        run: | # zizmor: ignore[template-injection]
          cosign sign-blob --yes --bundle "${{ steps.upload-cli.outputs.tar }}.bundle" "${{ steps.upload-cli.outputs.tar }}"
      - name: Upload tarball .bundle to release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: | # zizmor: ignore[template-injection]
          gh release upload ${{ github.ref_name }} "${{ steps.upload-cli.outputs.tar }}.bundle" --clobber
      - name: Attest build provenance (tarball)
        if: ${{ !inputs.dry_run }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: ${{ steps.upload-cli.outputs.tar }}
      - name: Sign aptu-mcp tarball with cosign
        if: ${{ !inputs.dry_run }}
        run: | # zizmor: ignore[template-injection]
          cosign sign-blob --yes --bundle "${{ steps.upload-mcp.outputs.tar }}.bundle" "${{ steps.upload-mcp.outputs.tar }}"
      - name: Upload aptu-mcp tarball .bundle to release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: | # zizmor: ignore[template-injection]
          gh release upload ${{ github.ref_name }} "${{ steps.upload-mcp.outputs.tar }}.bundle" --clobber
      - name: Attest build provenance (aptu-mcp tarball)
        if: ${{ !inputs.dry_run }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: ${{ steps.upload-mcp.outputs.tar }}
      - name: Generate aptu .deb package
        if: ${{ !inputs.dry_run && (startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux')) }}
        run: cargo deb --target ${{ inputs.target }} --no-build --package aptu-cli  # zizmor: ignore[template-injection]
      - name: Upload aptu .deb to release
        if: ${{ !inputs.dry_run && (startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux')) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: | # zizmor: ignore[template-injection]
          DEB_FILE=$(find target/${{ inputs.target }}/debian -name "aptu-cli_*.deb" -type f)
          if [ -n "$DEB_FILE" ]; then
            gh release upload ${{ github.ref_name }} "$DEB_FILE" --clobber
          fi
      - name: Sign aptu .deb with cosign
        if: ${{ !inputs.dry_run && (startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux')) }}
        run: | # zizmor: ignore[template-injection]
          DEB_FILE=$(find target/${{ inputs.target }}/debian -name "aptu-cli_*.deb" -type f)
          if [ -n "$DEB_FILE" ]; then
            cosign sign-blob --yes --bundle "$DEB_FILE.bundle" "$DEB_FILE"
          fi
      - name: Upload aptu .deb .bundle to release
        if: ${{ !inputs.dry_run && (startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux')) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: | # zizmor: ignore[template-injection]
          DEB_FILE=$(find target/${{ inputs.target }}/debian -name "aptu-cli_*.deb" -type f)
          if [ -n "$DEB_FILE" ]; then
            gh release upload ${{ github.ref_name }} "$DEB_FILE.bundle" --clobber
          fi
      - name: Attest build provenance (aptu .deb)
        if: ${{ !inputs.dry_run && (startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux')) }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: target/${{ inputs.target }}/debian/aptu-cli_*.deb
      - name: Generate aptu-mcp .deb package
        if: ${{ !inputs.dry_run && (startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux')) }}
        run: cargo deb --target ${{ inputs.target }} --no-build --package aptu-mcp  # zizmor: ignore[template-injection]
      - name: Upload aptu-mcp .deb to release
        if: ${{ !inputs.dry_run && (startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux')) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: | # zizmor: ignore[template-injection]
          DEB_FILE=$(find target/${{ inputs.target }}/debian -name "aptu-mcp_*.deb" -type f)
          if [ -n "$DEB_FILE" ]; then
            gh release upload ${{ github.ref_name }} "$DEB_FILE" --clobber
          fi
      - name: Sign aptu-mcp .deb with cosign
        if: ${{ !inputs.dry_run && (startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux')) }}
        run: | # zizmor: ignore[template-injection]
          DEB_FILE=$(find target/${{ inputs.target }}/debian -name "aptu-mcp_*.deb" -type f)
          if [ -n "$DEB_FILE" ]; then
            cosign sign-blob --yes --bundle "$DEB_FILE.bundle" "$DEB_FILE"
          fi
      - name: Upload aptu-mcp .deb .bundle to release
        if: ${{ !inputs.dry_run && (startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux')) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: | # zizmor: ignore[template-injection]
          DEB_FILE=$(find target/${{ inputs.target }}/debian -name "aptu-mcp_*.deb" -type f)
          if [ -n "$DEB_FILE" ]; then
            gh release upload ${{ github.ref_name }} "$DEB_FILE.bundle" --clobber
          fi
      - name: Attest build provenance (aptu-mcp .deb)
        if: ${{ !inputs.dry_run && (startsWith(inputs.target, 'x86_64-unknown-linux') || startsWith(inputs.target, 'aarch64-unknown-linux')) }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: target/${{ inputs.target }}/debian/aptu-mcp_*.deb
