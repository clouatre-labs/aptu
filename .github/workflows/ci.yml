name: CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
      - 'tests/**'
  pull_request:

concurrency:
  # PRs: cancel stale runs on force-push; push to main: each run gets a unique ID
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      tests: ${{ steps.filter.outputs.tests }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Detect file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            tests:
              - 'tests/**'
            workflows:
              - '.github/workflows/**'

  commitlint:
    name: Lint Commits
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6

  check-base:
    name: Check Branch Base
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Verify branch is rebased on main
        run: |
          git fetch origin main
          base_commit=$(git merge-base origin/main HEAD)
          main_head=$(git rev-parse origin/main)
          if [ "$base_commit" != "$main_head" ]; then
            behind=$(git rev-list --count $base_commit..$main_head)
            echo "::error::Branch is $behind commit(s) behind main. Rebase required."
            echo "Run: git fetch origin && git rebase origin/main"
            exit 1
          fi
          echo "Branch is up to date with main."

  deny:
    name: Audit Dependencies
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs: changes
    timeout-minutes: 10
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request')
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install cargo-deny
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-deny
      - name: Run cargo-deny
        run: cargo deny check


  format:
    name: Check Format
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs: changes
    timeout-minutes: 10
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') && github.actor != 'renovate[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs: changes
    timeout-minutes: 10
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') && github.actor != 'renovate[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "aptu"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Run Clippy lints
        run: cargo clippy --profile ci -- -D warnings -W clippy::cognitive_complexity
      - name: Build examples
        run: cargo build --examples -p aptu-core --profile ci

  test:
    name: Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs: changes
    timeout-minutes: 10
    if: (needs.changes.outputs.code == 'true' || needs.changes.outputs.tests == 'true' || github.event_name != 'pull_request') && github.actor != 'renovate[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "aptu"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-nextest
      - name: Run tests
        # --no-fail-fast: run all tests and report all failures at once
        run: cargo nextest run --workspace --locked --no-fail-fast

  integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs: [changes, test]
    timeout-minutes: 20
    if: |
      (needs.changes.outputs.code == 'true' || needs.changes.outputs.tests == 'true') &&
      !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'skip-integration')) &&
      (needs.test.result == 'success' || github.event_name != 'pull_request') &&
      github.actor != 'renovate[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "aptu"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build CLI binary
        run: |
          cargo build --profile ci -p aptu-cli
          chmod +x target/ci/aptu
      - name: Setup Bats testing framework
        uses: bats-core/bats-action@e412797c46257a2dbf3775f6f6010b33ee6cb99f # v3  # zizmor: ignore[impostor-commit]
        with:
          support-path: ${{ github.workspace }}/.bats-libs/bats-support
          assert-path: ${{ github.workspace }}/.bats-libs/bats-assert
          file-path: ${{ github.workspace }}/.bats-libs/bats-file
          detik-install: false
      - name: Run integration tests
        env:
          APTU_BIN: ${{ github.workspace }}/target/ci/aptu
          BATS_LIB_PATH: ${{ github.workspace }}/.bats-libs
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: bats tests/integration.bats

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    needs: [changes]
    if: needs.changes.outputs.workflows == 'true' || github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          advanced-security: false
          annotations: true
          min-severity: high

  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  ci-result:
    name: CI Result
    runs-on: ubuntu-24.04
    permissions: {}
    if: always()
    needs: [commitlint, check-base, deny, format, lint, test, integration, zizmor, gitleaks]
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed or were skipped."
