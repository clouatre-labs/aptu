name: Android KMP Build

on:
  push:
    branches: [main]
    paths:
      - 'AptuKMP/**'
      - 'crates/aptu-ffi/**'
      - '.github/workflows/android-kmp.yml'
  pull_request:
    branches: [main]
    paths:
      - 'AptuKMP/**'
      - 'crates/aptu-ffi/**'
      - '.github/workflows/android-kmp.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Dorg.gradle.daemon=false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: platform-tools build-tools;35.0.0 platforms;android-35 ndk;27.0.12077973
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # arm64-v8a only for CI debug builds; x86_64 doubles compile time with no CI benefit
          targets: aarch64-linux-android
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: true
      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('AptuKMP/**/*.gradle.kts', 'AptuKMP/**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Cache gobley-uniffi-bindgen
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: AptuKMP/shared/build/gobley-tools-install
          key: gobley-uniffi-bindgen-0.3.7-${{ runner.os }}
      - name: Build and test
        working-directory: AptuKMP
        run: ./gradlew :shared:assembleDebug :androidApp:assembleDebug :shared:testDebugUnitTest :androidApp:testDebugUnitTest --parallel --build-cache

  ci-result:
    name: CI Result
    runs-on: ubuntu-24.04
    permissions: {}
    if: always()
    needs: [build]
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed or were skipped."
