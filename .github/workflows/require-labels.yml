name: Require Labels

on:
  pull_request:
    types: [opened, labeled, unlabeled]

permissions: {}

jobs:
  check-labels:
    name: Check Labels
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Verify PR has at least one label
        uses: mheap/github-action-required-labels@0ac283b4e65c1fb28ce6079dea5546ceca98ccbe # v5
        with:
          mode: minimum
          count: 1
          labels: ".*"
          use_regex: true
