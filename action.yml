name: Aptu
description: "GitHub automation: AI issue triage, AI PR review, PR labeling, security scanning, and PR queue ranking"
author: Aptu Contributors

branding:
  icon: zap
  color: blue

inputs:
  # --- Auth ---
  github-token:
    description: GitHub token for API access
    required: true

  # --- AI provider API keys (alphabetical) ---
  anthropic-api-key:
    description: Anthropic API key (from https://console.anthropic.com/settings/keys)
    required: false
  cerebras-api-key:
    description: Cerebras API key (from https://console.cerebras.ai/keys)
    required: false
  gemini-api-key:
    description: Google Gemini API key (from https://aistudio.google.com/apikey)
    required: false
  groq-api-key:
    description: Groq API key (from https://console.groq.com/keys)
    required: false
  openrouter-api-key:
    description: OpenRouter API key (from https://openrouter.ai/keys)
    required: false
  zai-api-key:
    description: Z.AI API key (from https://z.ai)
    required: false
  zenmux-api-key:
    description: ZenMux API key (from https://zenmux.ai)
    required: false

  # --- AI model selection ---
  provider:
    description: >
      AI provider to use (anthropic, cerebras, gemini, groq, openrouter, zai, zenmux).
      Defaults to openrouter when not set.
    required: false
    default: ''
  model:
    description: >
      Model identifier for the selected provider. Defaults to mistralai/mistral-small-2603
      when provider is openrouter, or gemini-3.1-flash-lite when provider is gemini.
      See docs/CONFIGURATION.md for per-provider model lists.
    required: false
    default: ''
  fallback-provider:
    description: >
      AI provider to try when the primary provider fails (resilience chain).
      Independent of the primary provider default; set to empty string to disable fallback.
    required: false
    default: 'openrouter'
  fallback-model:
    description: Model for the fallback provider.
    required: false
    default: 'inception/mercury-2'

  # --- Behavior flags (alphabetical) ---
  apply-labels:
    description: Apply AI-suggested labels and milestone (issue triage and PR review)
    required: false
    default: 'true'
  dry-run:
    description: Run without making changes
    required: false
    default: 'false'
  no-comment:
    description: Skip posting comment to GitHub (issue triage and PR review)
    required: false
    default: 'false'
  skip-labeled:
    description: >
      Skip triage if the issue already has both a label with the `type:` prefix
      and a label matching `p[0-9]` (e.g. `p0`, `p1`, `p2`, `p3`).
      Only meaningful for issue events; set to `false` for PR events.
    required: false
    default: 'true'

  # --- Issue triage ---
  repo:
    description: >
      Target repository (owner/repo) for repository_dispatch invocations. When set alongside
      pull-number, the PR label and PR review steps fire on repository_dispatch events.
    required: false
    default: ''
  pull-number:
    description: >
      PR number for repository_dispatch invocations. Must be set alongside repo to trigger
      PR label and PR review steps on repository_dispatch events.
    required: false
    default: ''
  since:
    description: >
      For scheduled batch triage: triage all issues without labels created since this date
      (YYYY-MM-DD or RFC3339). If empty, all unlabeled issues in the repository are triaged.
      Only used when the workflow is triggered by a schedule event.
    required: false
    default: ''
  issue-state:
    description: >
      For scheduled batch triage: filter issues by state (open, closed, all).
      Only used when the workflow is triggered by a schedule event.
    required: false
    default: 'open'

  # --- PR review ---
  instructions-file:
    description: >
      Path to repository instructions file for PR review context.
      When set, overrides the default AGENTS.md and .github/instructions/pr-review.md files.
      Leave empty to use default file discovery.
    required: false
  repo-path:
    description: >
      Path to the local repository root for AST context injection into PR review prompts.
      When set (or inferred from the current working directory when omitted), `aptu pr review`
      will analyse changed source files (Rust, Python, Go, Java, TypeScript, TSX, JavaScript,
      C, C++, C#, Fortran) and append function signatures and call-graph context to the prompt.
      Set to an explicit path to override CWD inference.
    required: false
    default: ''
  deep:
    description: >
      Force cross-file call graph context in PR review unconditionally. When omitted, call
      graph is auto-enabled when budget_remaining (= max_prompt_chars minus the pre-call-graph
      prompt size estimate) exceeds min-budget-for-call-graph. Set to 'true' to always
      include call graph regardless of available budget.
    required: false
    default: 'false'
  max-prompt-chars:
    description: >
      Total prompt character budget for PR review. When the assembled prompt exceeds
      this limit, sections are dropped in order: call graph, AST, full file content,
      diff hunks. System prompt and PR metadata are never dropped.
      Maps to [review] max_prompt_chars in config.toml.
    required: false
    default: '120000'
  max-full-content-files:
    description: >
      Maximum number of files fetched in full via the GitHub Contents API per review.
      Maps to [review] max_full_content_files in config.toml.
    required: false
    default: '10'
  max-chars-per-file:
    description: >
      Maximum characters of full file content included per file in the review prompt.
      Maps to [review] max_chars_per_file in config.toml.
    required: false
    default: '16000'
  max-diff-chars:
    description: >
      Maximum total diff characters across all files in the review prompt.
      Diffs exceeding this limit are dropped from the prompt before assembly.
      Maps to [review] max_diff_chars in config.toml.
    required: false
    default: '200000'
  max-patch-chars-per-file:
    description: >
      Maximum characters for an individual file patch in the review prompt.
      File patches exceeding this limit are dropped entirely rather than sliced mid-hunk.
      Maps to [review] max_patch_chars_per_file in config.toml.
    required: false
    default: '10000'
  max-instructions-chars:
    description: >
      Maximum characters of instructions file content included in the review prompt.
      Maps to [review] max_instructions_chars in config.toml.
    required: false
    default: '1500'
  min-budget-for-call-graph:
    description: >
      Minimum remaining prompt budget (chars) to auto-enable call-graph enrichment.
      budget_remaining = max-prompt-chars minus the pre-call-graph prompt size estimate;
      call graph is built only when budget_remaining > this value (strict greater-than).
      Setting this above half of max-prompt-chars means call graph rarely fires;
      setting it >= max-prompt-chars disables auto-enable entirely (use deep: true instead).
      Set to 0 to always include call graph when repo-path is available.
      Maps to [review] min_budget_for_call_graph in config.toml.
    required: false
    default: '20000'
  max-dep-packages:
    description: >
      Maximum number of dependency bump packages for which upstream release notes
      are fetched and included in the review prompt.
      Maps to [review] max_dep_packages in config.toml.
    required: false
    default: '3'
  max-dep-release-chars:
    description: >
      Maximum characters of upstream release notes included per dependency package.
      Maps to [review] max_dep_release_chars in config.toml.
    required: false
    default: '2000'
  max-diff-bytes:
    description: >
      Maximum bytes for the raw PR diff; prompt-injection defence pre-check applied
      before prompt assembly. Raise for large refactor PRs.
      Maps to [prompt] max_diff_bytes in config.toml.
    required: false
    default: '524288'

  # --- Scan security ---
  scan-path:
    description: >
      Path to scan for security issues with aptu scan-security.
      Leave empty to skip the security scan step.
    required: false
    default: ''
  scan-security-diff:
    description: >
      Path to a unified diff file to scan for security issues (overrides scan-path when set).
      Leave empty to use scan-path directory scan.
    required: false
    default: ''

  # --- PR queue ---
  pr-queue:
    description: >
      Run aptu pr queue to output a ranked reviewability list of open PRs.
      Useful for workflow_dispatch or scheduled summary workflows.
    required: false
    default: 'false'

  # --- Routing (legacy) ---
  command:
    description: Command to run (issue or pr)
    required: false
    default: 'issue'
  subcommand:
    description: Subcommand to run (triage for issue, label or review for pr)
    required: false
    default: 'triage'

outputs:
  input-tokens:
    description: Total input tokens consumed across all AI calls in this run
    value: ${{ steps.metrics-aggregate.outputs.input_tokens }}
  output-tokens:
    description: Total output tokens consumed across all AI calls in this run
    value: ${{ steps.metrics-aggregate.outputs.output_tokens }}
  duration-ms:
    description: Total AI call duration in milliseconds
    value: ${{ steps.metrics-aggregate.outputs.duration_ms }}
  cost-usd:
    description: Estimated total cost in USD (provider-dependent, may be empty)
    value: ${{ steps.metrics-aggregate.outputs.cost_usd }}
  effective-token-units:
    description: Effective Token Units (normalized throughput signal)
    value: ${{ steps.metrics-aggregate.outputs.effective_token_units }}
  cache-hit-ratio:
    description: Cache hit ratio as integer percent (cache_read / (input + cache_read)), or n/a
    value: ${{ steps.metrics-aggregate.outputs.cache_hit_ratio }}

runs:
  using: composite
  steps:
    - name: Check if issue should be skipped
      id: check-skip
      shell: bash
      env:
        SKIP_LABELED: ${{ inputs.skip-labeled }}
        ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
      run: |
        if [[ "$SKIP_LABELED" == "true" ]]; then
          HAS_TYPE=$(echo "$ISSUE_LABELS" | jq '(. // []) | [.[].name | select(startswith("type:"))] | length > 0')
          HAS_PRIORITY=$(echo "$ISSUE_LABELS" | jq '(. // []) | [.[].name | select(test("^p[0-9]$"))] | length > 0')
          if [[ "$HAS_TYPE" == "true" && "$HAS_PRIORITY" == "true" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Issue already has type and priority labels, skipping triage"
            exit 0
          fi
        fi
        echo "skip=false" >> $GITHUB_OUTPUT

    - name: Write fallback AI config
      if: inputs.fallback-provider != '' || inputs.fallback-model != ''
      shell: bash
      env:
        INPUT_FALLBACK_PROVIDER: ${{ inputs.fallback-provider }}
        INPUT_FALLBACK_MODEL: ${{ inputs.fallback-model }}
      run: |
        mkdir -p "$HOME/.config/aptu"
        printf '[ai.fallback]\nchain = [{ provider = "%s", model = "%s" }]\n' \
          "$INPUT_FALLBACK_PROVIDER" "$INPUT_FALLBACK_MODEL" \
          > "$HOME/.config/aptu/config.toml"

    - name: Resolve aptu version
      id: resolve-version
      if: steps.check-skip.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        echo "::group::Resolving latest aptu v0.x release"
        APTU_VERSION=$(gh api repos/clouatre-labs/aptu/releases \
          --jq '[.[] | select(.tag_name | startswith("v0."))] | first | .tag_name' \
          | sed 's/^v//')
        if [[ -z "$APTU_VERSION" ]]; then
          echo "::error::Could not resolve latest aptu v0.x release"
          exit 1
        fi
        echo "Resolved: $APTU_VERSION"
        echo "version=$APTU_VERSION" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    - name: Cache aptu binary
      id: cache-aptu
      if: steps.check-skip.outputs.skip != 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.local/bin/aptu
        key: aptu-${{ steps.resolve-version.outputs.version }}-${{ runner.os }}-${{ runner.arch }}
        restore-keys: |
          aptu-${{ steps.resolve-version.outputs.version }}-${{ runner.os }}-

    - name: Install aptu binary
      id: install-aptu
      if: steps.check-skip.outputs.skip != 'true' && steps.cache-aptu.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        APTU_VERSION: ${{ steps.resolve-version.outputs.version }}
      run: |
        set -euo pipefail
        echo "::group::Installing aptu v$APTU_VERSION"

        case "$(uname -m)" in
          aarch64 | arm64) ARCH="aarch64" ;;
          x86_64)          ARCH="x86_64"  ;;
          *) echo "::error::Unsupported architecture $(uname -m)" >&2; exit 1 ;;
        esac
        ARCHIVE="aptu-cli-${APTU_VERSION}-${ARCH}-unknown-linux-musl.tar.gz"
        TEMP_DIR=$(mktemp -d)
        trap 'rm -rf "$TEMP_DIR"' EXIT

        # Download archive + checksum (authenticated, avoids rate limits)
        gh release download "v${APTU_VERSION}" -R clouatre-labs/aptu \
          --pattern "${ARCHIVE}" \
          --pattern "${ARCHIVE%.tar.gz}.sha256" \
          -D "$TEMP_DIR"

        # Verify SHA256 before extracting
        pushd "$TEMP_DIR" > /dev/null
        sha256sum -c "${ARCHIVE%.tar.gz}.sha256"
        popd > /dev/null

        # Verify build provenance attestation (SLSA) against the tarball
        gh attestation verify "$TEMP_DIR/${ARCHIVE}" -R clouatre-labs/aptu

        tar -xzf "$TEMP_DIR/${ARCHIVE}" -C "$TEMP_DIR"

        mkdir -p "$HOME/.local/bin"
        install -m 0755 "$TEMP_DIR/aptu" "$HOME/.local/bin/aptu"

        echo "aptu v$APTU_VERSION installed and verified"
        echo "::endgroup::"

    - name: Setup PATH
      if: steps.check-skip.outputs.skip != 'true'
      id: setup-path
      shell: bash
      run: |  # zizmor: ignore[github-env]
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Run aptu issue triage
      if: github.event_name == 'issues' && steps.check-skip.outputs.skip != 'true'
      shell: bash
      env:
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CEREBRAS_API_KEY: ${{ inputs.cerebras-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        ZAI_API_KEY: ${{ inputs.zai-api-key }}
        ZENMUX_API_KEY: ${{ inputs.zenmux-api-key }}
        APTU_AI__PROVIDER: ${{ inputs.provider }}
        APTU_AI__MODEL: ${{ inputs.model }}
        APPLY_LABELS: ${{ inputs.apply-labels }}
        DRY_RUN: ${{ inputs.dry-run }}
        NO_COMMENT: ${{ inputs.no-comment }}
        APTU_METRICS_FILE: ${{ runner.temp }}/aptu-token-usage.jsonl
      run: |
        set -e

        ISSUE_REF="${REPO}#${ISSUE_NUMBER}"
        ARGS=()

        if [[ "$DRY_RUN" == "true" ]]; then
          ARGS+=(--dry-run)
        fi

        if [[ "$APPLY_LABELS" == "false" ]]; then
          ARGS+=(--no-apply)
        fi

        if [[ "$NO_COMMENT" == "true" ]]; then
          ARGS+=(--no-comment)
        fi

        echo "Running: aptu issue triage ${ARGS[*]} $ISSUE_REF"
        aptu issue triage "${ARGS[@]}" "$ISSUE_REF"

    - name: Run aptu issue triage (scheduled batch)
      if: github.event_name == 'schedule' && steps.check-skip.outputs.skip != 'true'
      shell: bash
      env:
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CEREBRAS_API_KEY: ${{ inputs.cerebras-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        ZAI_API_KEY: ${{ inputs.zai-api-key }}
        ZENMUX_API_KEY: ${{ inputs.zenmux-api-key }}
        APTU_AI__PROVIDER: ${{ inputs.provider }}
        APTU_AI__MODEL: ${{ inputs.model }}
        APPLY_LABELS: ${{ inputs.apply-labels }}
        DRY_RUN: ${{ inputs.dry-run }}
        ISSUE_STATE: ${{ inputs.issue-state }}
        NO_COMMENT: ${{ inputs.no-comment }}
        SINCE: ${{ inputs.since }}
        APTU_METRICS_FILE: ${{ runner.temp }}/aptu-token-usage.jsonl
      run: |
        set -e
        ARGS=(--repo "$REPO")
        if [[ -n "$SINCE" ]]; then
          ARGS+=(--since "$SINCE")
        fi
        if [[ -n "$ISSUE_STATE" && "$ISSUE_STATE" != "open" ]]; then
          ARGS+=(--state "$ISSUE_STATE")
        fi
        if [[ "$DRY_RUN" == "true" ]]; then
          ARGS+=(--dry-run)
        fi
        if [[ "$APPLY_LABELS" == "false" ]]; then
          ARGS+=(--no-apply)
        fi
        if [[ "$NO_COMMENT" == "true" ]]; then
          ARGS+=(--no-comment)
        fi
        echo "Running: aptu issue triage ${ARGS[*]}"
        aptu issue triage "${ARGS[@]}"

    - name: Run aptu PR label
      if: github.event_name == 'pull_request' || (github.event_name == 'repository_dispatch' && inputs.repo != '' && inputs['pull-number'] != '')
      shell: bash
      env:
        PR_NUMBER: ${{ github.event_name == 'repository_dispatch' && inputs['pull-number'] || github.event.pull_request.number }}
        REPO: ${{ github.event_name == 'repository_dispatch' && inputs.repo || github.repository }}
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CEREBRAS_API_KEY: ${{ inputs.cerebras-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        ZAI_API_KEY: ${{ inputs.zai-api-key }}
        ZENMUX_API_KEY: ${{ inputs.zenmux-api-key }}
        APTU_AI__PROVIDER: ${{ inputs.provider }}
        APTU_AI__MODEL: ${{ inputs.model }}
        DRY_RUN: ${{ inputs.dry-run }}
        APTU_METRICS_FILE: ${{ runner.temp }}/aptu-token-usage.jsonl
      run: |
        set -e

        PR_REF="${REPO}#${PR_NUMBER}"
        ARGS=()

        if [[ "$DRY_RUN" == "true" ]]; then
          ARGS+=(--dry-run)
        fi

        echo "Running: aptu pr label ${ARGS[*]} $PR_REF"
        aptu pr label "${ARGS[@]}" "$PR_REF"

    - name: Run aptu PR review
      if: github.event_name == 'pull_request' || (github.event_name == 'repository_dispatch' && inputs.repo != '' && inputs['pull-number'] != '')
      continue-on-error: true  # Non-blocking - AI review is advisory
      shell: bash
      env:
        PR_NUMBER: ${{ github.event_name == 'repository_dispatch' && inputs['pull-number'] || github.event.pull_request.number }}
        REPO: ${{ github.event_name == 'repository_dispatch' && inputs.repo || github.repository }}
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CEREBRAS_API_KEY: ${{ inputs.cerebras-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        ZAI_API_KEY: ${{ inputs.zai-api-key }}
        ZENMUX_API_KEY: ${{ inputs.zenmux-api-key }}
        APTU_AI__PROVIDER: ${{ inputs.provider }}
        APTU_AI__MODEL: ${{ inputs.model }}
        APPLY_LABELS: ${{ inputs.apply-labels }}
        DEEP: ${{ inputs.deep }}
        DRY_RUN: ${{ inputs.dry-run }}
        INSTRUCTIONS_FILE: ${{ inputs.instructions-file }}
        NO_COMMENT: ${{ inputs.no-comment }}
        REPO_PATH: ${{ inputs.repo-path }}
        APTU_REVIEW__MAX_PROMPT_CHARS: ${{ inputs.max-prompt-chars }}
        APTU_REVIEW__MAX_FULL_CONTENT_FILES: ${{ inputs.max-full-content-files }}
        APTU_REVIEW__MAX_CHARS_PER_FILE: ${{ inputs.max-chars-per-file }}
        APTU_REVIEW__MAX_DIFF_CHARS: ${{ inputs.max-diff-chars }}
        APTU_REVIEW__MAX_PATCH_CHARS_PER_FILE: ${{ inputs.max-patch-chars-per-file }}
        APTU_REVIEW__MAX_INSTRUCTIONS_CHARS: ${{ inputs.max-instructions-chars }}
        APTU_REVIEW__MIN_BUDGET_FOR_CALL_GRAPH: ${{ inputs.min-budget-for-call-graph }}
        APTU_REVIEW__MAX_DEP_PACKAGES: ${{ inputs.max-dep-packages }}
        APTU_REVIEW__MAX_DEP_RELEASE_CHARS: ${{ inputs.max-dep-release-chars }}
        APTU_PROMPT__MAX_DIFF_BYTES: ${{ inputs.max-diff-bytes }}
        APTU_METRICS_FILE: ${{ runner.temp }}/aptu-token-usage.jsonl
        APTU_CONTEXT_FILE: ${{ runner.temp }}/aptu-review-context.jsonl
      run: |
        set -e

        PR_REF="${REPO}#${PR_NUMBER}"
        ARGS=(--comment --force)

        if [[ "$DRY_RUN" == "true" ]]; then
          ARGS+=(--dry-run)
        fi

        if [[ "$APPLY_LABELS" == "false" ]]; then
          ARGS+=(--no-apply)
        fi

        if [[ "$NO_COMMENT" == "true" ]]; then
          ARGS+=(--no-comment)
        fi

        if [[ -n "$REPO_PATH" ]]; then
          ARGS+=(--repo-path "$REPO_PATH")
        fi
        if [[ "$DEEP" == "true" && -n "$REPO_PATH" ]]; then
          ARGS+=(--deep)
        fi
        if [[ -n "$INSTRUCTIONS_FILE" ]]; then
          ARGS+=(--instructions-file "$INSTRUCTIONS_FILE")
        fi

        echo "Running: aptu pr review ${ARGS[*]} $PR_REF"
        aptu pr review "${ARGS[@]}" "$PR_REF"

    - name: Run aptu scan-security
      if: inputs.scan-path != '' || inputs.scan-security-diff != ''
      continue-on-error: true
      shell: bash
      env:
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CEREBRAS_API_KEY: ${{ inputs.cerebras-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        ZAI_API_KEY: ${{ inputs.zai-api-key }}
        ZENMUX_API_KEY: ${{ inputs.zenmux-api-key }}
        DRY_RUN: ${{ inputs.dry-run }}
        SCAN_DIFF: ${{ inputs.scan-security-diff }}
        SCAN_PATH: ${{ inputs.scan-path }}
      run: |
        set -e
        if [[ -n "$SCAN_DIFF" ]]; then
          echo "Running: aptu scan-security --diff $SCAN_DIFF --output sarif"
          aptu scan-security --diff "$SCAN_DIFF" --output sarif
        else
          echo "Running: aptu scan-security $SCAN_PATH --output sarif"
          aptu scan-security "$SCAN_PATH" --output sarif
        fi

    - name: Run aptu pr queue
      if: inputs.pr-queue == 'true'
      continue-on-error: true
      shell: bash
      env:
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ inputs.github-token || github.token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CEREBRAS_API_KEY: ${{ inputs.cerebras-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        ZAI_API_KEY: ${{ inputs.zai-api-key }}
        ZENMUX_API_KEY: ${{ inputs.zenmux-api-key }}
        APTU_AI__PROVIDER: ${{ inputs.provider }}
        APTU_AI__MODEL: ${{ inputs.model }}
      run: |
        set -e
        echo "Running: aptu pr queue --repo $REPO"
        aptu pr queue --repo "$REPO"

    - name: Aggregate metrics outputs
      id: metrics-aggregate
      if: always()
      shell: bash
      run: |
        if ! command -v jq >/dev/null 2>&1; then
          echo "::warning::aptu: jq not found; token usage metrics will be unavailable" >&2
        fi
        if [ -f "$RUNNER_TEMP/aptu-token-usage.jsonl" ]; then
          input_tokens=$(jq -s '[.[].input_tokens] | add // 0' "$RUNNER_TEMP/aptu-token-usage.jsonl")
          output_tokens=$(jq -s '[.[].output_tokens] | add // 0' "$RUNNER_TEMP/aptu-token-usage.jsonl")
          duration_ms=$(jq -s '[.[].duration_ms] | add // 0' "$RUNNER_TEMP/aptu-token-usage.jsonl")
          cost_usd=$(jq -s '[.[].cost_usd | select(. != null)] | if length > 0 then add else empty end' "$RUNNER_TEMP/aptu-token-usage.jsonl" 2>/dev/null || echo "")
          echo "input_tokens=$input_tokens" >> "$GITHUB_OUTPUT"
          echo "output_tokens=$output_tokens" >> "$GITHUB_OUTPUT"
          echo "duration_ms=$duration_ms" >> "$GITHUB_OUTPUT"
          echo "cost_usd=$cost_usd" >> "$GITHUB_OUTPUT"
          
          # Effective Token Units (sum across all records)
          ETU=$(jq -s '[.[].effective_token_units // 0] | add // 0 | ceil' "$RUNNER_TEMP/aptu-token-usage.jsonl" 2>/tmp/jq-etu-err || { echo "::warning::aptu: jq parse failed for effective_token_units: $(cat /tmp/jq-etu-err 2>/dev/null)" >&2; echo "0"; })
          echo "effective_token_units=$ETU" >> "$GITHUB_OUTPUT"
          
          # Cache hit ratio (cache_read / (input + cache_read)), as integer percent, or n/a
          TOTAL_INPUT=$(jq -s '[.[].input_tokens // 0] | add // 0' "$RUNNER_TEMP/aptu-token-usage.jsonl" 2>/dev/null || echo "0")
          TOTAL_CACHE_READ=$(jq -s '[.[].cache_read_tokens // 0] | add // 0' "$RUNNER_TEMP/aptu-token-usage.jsonl" 2>/dev/null || echo "0")
          if [ "$TOTAL_INPUT" -gt 0 ] || [ "$TOTAL_CACHE_READ" -gt 0 ]; then
            CACHE_PCT=$(jq -n "($TOTAL_CACHE_READ / ($TOTAL_INPUT + $TOTAL_CACHE_READ) * 100) | round" 2>/tmp/jq-cache-err || { echo "::warning::aptu: jq parse failed for cache_hit_ratio: $(cat /tmp/jq-cache-err 2>/dev/null)" >&2; echo "0"; })
            echo "cache_hit_ratio=${CACHE_PCT}%" >> "$GITHUB_OUTPUT"
          else
            echo "cache_hit_ratio=n/a" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "input_tokens=0" >> "$GITHUB_OUTPUT"
          echo "output_tokens=0" >> "$GITHUB_OUTPUT"
          echo "duration_ms=0" >> "$GITHUB_OUTPUT"
          echo "cost_usd=" >> "$GITHUB_OUTPUT"
          echo "effective_token_units=0" >> "$GITHUB_OUTPUT"
          echo "cache_hit_ratio=n/a" >> "$GITHUB_OUTPUT"
        fi

    - name: Write token usage summary
      if: always()
      shell: bash
      run: |
        if [ -f "$RUNNER_TEMP/aptu-token-usage.jsonl" ]; then
          echo "### Aptu token usage" >> "$GITHUB_STEP_SUMMARY"
          echo "| Model | Input | Output | Cache read | Cache write | Duration | ETU | Cache% | Cost |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          jq -r '. | "| \(.model) | \(.input_tokens) | \(.output_tokens) | \(.cache_read_tokens // 0) | \(.cache_write_tokens // 0) | \(.duration_ms)ms | \(.effective_token_units // 0 | ceil | tostring) | \(if ((.input_tokens // 0) + (.cache_read_tokens // 0)) > 0 then ((.cache_read_tokens // 0) / ((.input_tokens // 0) + (.cache_read_tokens // 0)) * 100 | round | tostring) + "%" else "n/a" end) | \(if .cost_usd then ("$" + (.cost_usd | tostring)) else "n/a" end) |"' \
            "$RUNNER_TEMP/aptu-token-usage.jsonl" >> "$GITHUB_STEP_SUMMARY"
        fi
        
        # Context budget summary
        if [ -n "${APTU_CONTEXT_FILE:-}" ] && [ -f "$APTU_CONTEXT_FILE" ]; then
          FILES_TOTAL=$(jq -s '[.[].files_total // 0] | add // 0' "$APTU_CONTEXT_FILE")
          FILES_TRUNC=$(jq -s '[.[].files_truncated // 0] | add // 0' "$APTU_CONTEXT_FILE")
          CHARS_DROPPED=$(jq -s '[.[].truncated_chars_dropped // 0] | add // 0' "$APTU_CONTEXT_FILE")
          PROMPT_CHARS=$(jq -s '[.[].prompt_chars_final // 0] | max // 0' "$APTU_CONTEXT_FILE")
          MAX_CHARS=$(jq -s '[.[].max_prompt_chars // 120000] | max' "$APTU_CONTEXT_FILE")
          BUDGET_PCT=$(( PROMPT_CHARS * 100 / MAX_CHARS ))
          DROPS=$(jq -rs '[.[].budget_drops // [] | .[]] | unique | join(", ")' "$APTU_CONTEXT_FILE")
          {
            echo ""
            echo "#### Context budget"
            echo "Files: ${FILES_TOTAL} total, ${FILES_TRUNC} truncated (${CHARS_DROPPED} chars dropped)"
            echo "Prompt budget: ${BUDGET_PCT}% of ${MAX_CHARS} chars"
            if [ -n "$DROPS" ]; then
              echo "Dropped due to budget: ${DROPS}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload token usage artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: aptu-token-usage-${{ github.run_id }}
        path: ${{ runner.temp }}/aptu-token-usage.jsonl
        retention-days: 90
        if-no-files-found: ignore

    - name: Upload review context artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: aptu-review-context-${{ github.run_id }}
        path: ${{ runner.temp }}/aptu-review-context.jsonl
        retention-days: 90
        if-no-files-found: ignore
